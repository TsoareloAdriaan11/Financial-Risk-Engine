# .github/workflows/risk_engine.yml
#
# Financial Risk Engine — Detection & Alert Pipeline
#
# Triggers:
#   1. Automatically after Live Transaction Stream completes (chained)
#   2. Manually via "Run workflow" button
#
# Does NOT run on a schedule — only fires when triggered by the stream
# or manually. This prevents stale re-runs with no new data.

name: Financial Risk Engine

on:
  # Runs automatically the moment the Live Transaction Stream finishes
  workflow_run:
    workflows: ["Live Transaction Stream"]
    types:
      - completed

  # Manual trigger — click "Run workflow" in GitHub Actions UI
  workflow_dispatch:

jobs:
  run-risk-engine:
    name: Run Financial Risk Engine
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Execute Financial Risk Engine
        env:
          NEO4J_URI:             ${{ secrets.NEO4J_URI }}
          NEO4J_USERNAME:        ${{ secrets.NEO4J_USERNAME }}
          NEO4J_PASSWORD:        ${{ secrets.NEO4J_PASSWORD }}
          ALERT_EMAIL_SENDER:    ${{ secrets.ALERT_EMAIL_SENDER }}
          ALERT_EMAIL_PASSWORD:  ${{ secrets.ALERT_EMAIL_PASSWORD }}
          ALERT_EMAIL_RECIPIENT: ${{ secrets.ALERT_EMAIL_RECIPIENT }}
          GITHUB_RUN_ID:         ${{ github.run_id }}
        run: |
          cd src
          python main.py

      - name: Upload anomaly report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: risk-report-${{ github.run_id }}
          path: src/risk_report_*.html
          retention-days: 90

      - name: Upload run log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: risk-engine-log-${{ github.run_id }}
          path: src/
          retention-days: 30
